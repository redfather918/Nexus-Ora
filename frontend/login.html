<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — Nexus Ora 灵境八部</title>
<meta name="robots" content="noindex">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #080618;
    color: #fff;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
}
body::before {
    content: ''; position: fixed; inset: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(168,85,247,0.15), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(99,102,241,0.12), transparent 50%);
    pointer-events: none; z-index: -1;
}
.card {
    width: 100%; max-width: 420px;
    background: rgba(15,12,31,0.85);
    border: 1px solid rgba(168,85,247,0.3);
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(168,85,247,0.1);
}
.logo { text-align: center; margin-bottom: 8px; font-size: 28px; font-weight: 600;
    background: linear-gradient(135deg, #A855F7 0%, #6366F1 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
}
.subtitle { text-align: center; color: #9CA3AF; font-size: 14px; margin-bottom: 32px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; color: #9CA3AF; margin-bottom: 6px; }
.input-row { display: flex; gap: 8px; }
input {
    width: 100%; padding: 14px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: #fff; font-size: 15px;
    outline: none; transition: border-color 0.2s;
}
input:focus { border-color: #A855F7; }
input::placeholder { color: #6B7280; }
.sms-btn {
    padding: 0 18px; background: rgba(168,85,247,0.15);
    border: 1px solid rgba(168,85,247,0.4); color: #A855F7;
    border-radius: 12px; font-size: 13px; cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
}
.sms-btn:hover { background: rgba(168,85,247,0.25); }
.sms-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.submit {
    width: 100%; padding: 14px; margin-top: 8px;
    background: linear-gradient(135deg, #A855F7 0%, #6366F1 100%);
    color: #fff; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 500; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
}
.submit:hover { box-shadow: 0 8px 20px rgba(168,85,247,0.4); }
.submit:active { transform: scale(0.98); }
.submit:disabled { opacity: 0.5; cursor: not-allowed; }
.tip { margin-top: 12px; text-align: center; color: #6B7280; font-size: 12px; line-height: 1.6; }
.tip a { color: #A855F7; text-decoration: none; }
.dev-code { margin-top: 12px; padding: 10px; background: rgba(34,197,94,0.1); border: 1px dashed #22C55E;
    border-radius: 8px; color: #22C55E; font-size: 12px; text-align: center; display: none; }
.err { color: #EF4444; font-size: 12px; margin-top: 6px; display: none; }
</style>
</head>
<body>
<div class="card">
    <div class="logo">✦ Nexus Ora ✦</div>
    <div class="subtitle">登录以同步你的命盘</div>

    <div class="field">
        <label>手机号</label>
        <input id="phone" type="tel" maxlength="11" placeholder="请输入手机号" autocomplete="tel">
        <div class="err" id="err-phone"></div>
    </div>

    <div class="field">
        <label>验证码</label>
        <div class="input-row">
            <input id="code" type="text" maxlength="6" placeholder="6 位验证码" autocomplete="one-time-code">
            <button class="sms-btn" id="sms-btn" type="button">获取验证码</button>
        </div>
        <div class="err" id="err-code"></div>
        <div class="dev-code" id="dev-code"></div>
    </div>

    <button class="submit" id="submit">登录 / 注册</button>
    <div class="tip">
        登录即代表同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a><br>
        未注册手机号将自动创建账号
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
const phoneEl = $('phone'), codeEl = $('code');
const smsBtn = $('sms-btn'), submitBtn = $('submit');
const errPhone = $('err-phone'), errCode = $('err-code'), devCode = $('dev-code');

function showErr(el, msg) { el.textContent = msg; el.style.display = msg ? 'block' : 'none'; }
function clearErr() { showErr(errPhone, ''); showErr(errCode, ''); }

// 60s 倒计时
let countdown = 0;
const timer = setInterval(() => {
    if (countdown > 0) {
        smsBtn.disabled = true;
        smsBtn.textContent = `${countdown}s 后重试`;
        countdown--;
    } else if (countdown === 0 && smsBtn.disabled) {
        smsBtn.disabled = false;
        smsBtn.textContent = '获取验证码';
    }
}, 1000);

smsBtn.addEventListener('click', async () => {
    clearErr();
    const phone = phoneEl.value.trim();
    if (!/^1[3-9]\d{9}$/.test(phone)) {
        showErr(errPhone, '请输入正确的手机号');
        return;
    }
    smsBtn.disabled = true;
    smsBtn.textContent = '发送中...';
    try {
        const res = await fetch('/api/auth/send-sms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone })
        });
        const data = await res.json();
        if (data.code === 0) {
            countdown = 60;
            if (data.debugCode) {
                devCode.textContent = `🛠 开发模式验证码：${data.debugCode}`;
                devCode.style.display = 'block';
                codeEl.value = data.debugCode;
            }
        } else {
            smsBtn.disabled = false;
            smsBtn.textContent = '获取验证码';
            showErr(errPhone, data.msg || '发送失败');
        }
    } catch (e) {
        smsBtn.disabled = false;
        smsBtn.textContent = '获取验证码';
        showErr(errPhone, '网络错误：' + e.message);
    }
});

submitBtn.addEventListener('click', async () => {
    clearErr();
    const phone = phoneEl.value.trim();
    const code = codeEl.value.trim();
    if (!/^1[3-9]\d{9}$/.test(phone)) return showErr(errPhone, '请输入正确的手机号');
    if (!/^\d{6}$/.test(code)) return showErr(errCode, '请输入 6 位验证码');

    submitBtn.disabled = true;
    submitBtn.textContent = '登录中...';
    try {
        const res = await fetch('/api/auth/phone-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, code })
        });
        const data = await res.json();
        if (data.code === 0) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            submitBtn.textContent = '✓ 登录成功';
            setTimeout(() => {
                const back = new URLSearchParams(location.search).get('back') || '/';
                location.href = back;
            }, 600);
        } else {
            submitBtn.disabled = false;
            submitBtn.textContent = '登录 / 注册';
            showErr(errCode, data.msg || '登录失败');
        }
    } catch (e) {
        submitBtn.disabled = false;
        submitBtn.textContent = '登录 / 注册';
        showErr(errCode, '网络错误：' + e.message);
    }
});

// Enter 提交
codeEl.addEventListener('keypress', e => { if (e.key === 'Enter') submitBtn.click(); });
phoneEl.addEventListener('keypress', e => { if (e.key === 'Enter') codeEl.focus(); });
</script>
</body>
</html>
